############################
# Baseline de VM
############################
# Reduz o uso de swap, mantendo previsibilidade
vm.swappiness = 10
############################
# Hardening de kernel
############################
# Restringe acesso ao buffer do kernel
kernel.dmesg_restrict = 1
# Oculta ponteiros do kernel
kernel.kptr_restrict = 2
# Evita core dumps de binários setuid
fs.suid_dumpable = 0
############################
# Proteção de filesystem
############################
# Bloqueia abuso de hardlinks
fs.protected_hardlinks = 1
# Bloqueia abuso de symlinks
fs.protected_symlinks = 1
# Protege FIFOs
fs.protected_fifos = 1
# Protege arquivos regulares
fs.protected_regular = 1

############################
# Protecao contra > Dirty Frag, permite que invasores locais 
# elevem privilégios e obtenham acesso root
# OBS: A desativação dos módulos esp4 e esp6 interromperá qualquer conexão VPN 
# ou túnel que utilize o protocolo IPsec. 
# Se o seu ambiente depende de IPsec para comunicações seguras ou privadas, 
# não utilize esta mitigação e priorize a atualização definitiva com reboot.
############################

cat << 'EOF' > /etc/modprobe.d/dirtyfrag.conf
install esp4 /bin/false
install esp6 /bin/false
install rxrpc /bin/false
EOF
rmmod esp4 esp6 rxrpc
echo 3 > /proc/sys/vm/drop_caches
